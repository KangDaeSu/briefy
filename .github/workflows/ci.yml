name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: backend
        run: ./mvnw test

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ''

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: briefy
          POSTGRES_USER: briefy
          POSTGRES_PASSWORD: briefy
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Start backend
        working-directory: backend
        run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=test &
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/briefy
          SPRING_DATASOURCE_USERNAME: briefy
          SPRING_DATASOURCE_PASSWORD: briefy
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 2
          done

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev &
        env:
          VITE_API_BASE_URL: http://localhost:8080

      - name: Wait for frontend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && break
            sleep 2
          done

      - name: Run E2E tests
        working-directory: frontend
        run: npm run e2e
        env:
          E2E_BASE_URL: http://localhost:5173

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        working-directory: backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Note: Ensure the following secrets are set in GitHub:
      # - RAILWAY_TOKEN
      # - JWT_SECRET (for E2E tests)
      #
      # Ensure the following variables are set in Railway for the Backend service:
      # - SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
      # - JWT_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
      # - FRONTEND_URL

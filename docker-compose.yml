version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg18
    container_name: briefy-db
    environment:
      POSTGRES_DB: ${DB_NAME:-briefy}
      POSTGRES_USER: ${DB_USER:-briefy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-briefy}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-briefy} -d ${DB_NAME:-briefy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: briefy-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # 웹 UI
    restart: unless-stopped

volumes:
  postgres_data:
spring:
  application:
    name: briefy

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/briefy}
    username: ${SPRING_DATASOURCE_USERNAME:briefy}
    password: ${SPRING_DATASOURCE_PASSWORD:briefy}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    repair-on-migrate: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-local-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-local-client-secret}
            scope: email, profile

jwt:
  # Base64-encoded 256-bit key (개발용 기본값 — 프로덕션에서 반드시 교체)
  secret: ${JWT_SECRET:YnJpZWZ5LWp3dC1zZWNyZXQta2V5LWZvci1kZXYtb2s=}
  expiration-ms: 604800000  # 7일

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.briefy: INFO
